<style id="ev-bloque2-correccion-gerencial">
/* BLOQUE 2 CORREGIDO
   - Sin franja diagonal de AGOTADO
   - Catálogo más amplio y respirado en computadora
   - Dos columnas reales en escritorio
   - Una columna en celular
   - No altera carrito, precios, cantidades ni tabulación
*/

/* Elimina completamente la cinta roja diagonal */
.producto.ev-agotado::before,
.producto:has(button[disabled])::before {
  content: none !important;
  display: none !important;
}

/* El agotado se comunica solamente en el botón y en Stock */
.producto.ev-agotado,
.producto:has(button[disabled]) {
  opacity: 1 !important;
  border-color: #d9e0e8 !important;
  background: #fbfcfd !important;
}

.producto.ev-agotado .imagen,
.producto:has(button[disabled]) .imagen {
  opacity: .78 !important;
}

.producto button[disabled] {
  background: #737f8c !important;
  color: #fff !important;
  cursor: not-allowed !important;
}

/* Más aire y presencia de página web en computadora */
#evProductosGrid {
  width: min(1280px, calc(100% - 64px)) !important;
  max-width: 1280px !important;
  margin: 30px auto 56px !important;
  padding: 0 !important;
  grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
  column-gap: 34px !important;
  row-gap: 36px !important;
}

#evProductosGrid > .producto {
  padding: 24px !important;
  border-radius: 20px !important;
  box-shadow: 0 10px 28px rgba(19, 47, 78, .09) !important;
}

.producto .imagen {
  height: 235px !important;
  margin: 8px 0 14px !important;
}

.producto .imagen img {
  height: 210px !important;
  max-width: 310px !important;
}

.producto h2 {
  min-height: 2.8em !important;
  font-size: 1.16rem !important;
  margin-bottom: 10px !important;
}

.producto .detalles {
  padding: 14px 0 !important;
}

/* Inicio más limpio, compacto y ordenado */
.hero {
  padding-top: 28px !important;
  padding-bottom: 28px !important;
}

.hero .logo {
  max-height: 125px !important;
}

.hero-title {
  margin-top: 8px !important;
}

.hero-sub {
  margin-bottom: 14px !important;
}

.hero-steps {
  margin-top: 12px !important;
  margin-bottom: 14px !important;
}

.ev-menu {
  max-width: 1216px !important;
  margin-top: 26px !important;
}

/* Pantallas medianas: sigue en dos columnas, pero con mejor separación */
@media (max-width: 1050px) {
  #evProductosGrid {
    width: min(940px, calc(100% - 40px)) !important;
    grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
    gap: 24px !important;
  }

  #evProductosGrid > .producto {
    padding: 20px !important;
  }

  .producto .imagen {
    height: 210px !important;
  }

  .producto .imagen img {
    height: 188px !important;
    max-width: 270px !important;
  }
}

/* Celular: una sola columna, amplia y fácil de usar */
@media (max-width: 700px) {
  #evProductosGrid {
    width: auto !important;
    margin: 18px 12px 38px !important;
    padding: 0 !important;
    grid-template-columns: 1fr !important;
    gap: 20px !important;
  }

  #evProductosGrid > .producto {
    padding: 17px !important;
  }

  .producto .imagen {
    height: 205px !important;
  }

  .producto .imagen img {
    height: 182px !important;
    max-width: 270px !important;
  }

  .hero {
    padding: 20px 12px !important;
  }

  .hero .logo {
    max-height: 105px !important;
  }
}

/* En monitores muy grandes se mantiene en dos columnas para evitar tarjetas apretadas */
@media (min-width: 1500px) {
  #evProductosGrid {
    max-width: 1360px !important;
    width: min(1360px, calc(100% - 96px)) !important;
    gap: 40px !important;
  }
}
</style>

    return (title(c).split(/[\/·]/)[0]||'').trim();
  }
  function isUnavailable(c){
    const t=norm(c.innerText||c.textContent);
    return /AGOTADO|NO DISPONIBLE|SIN STOCK/.test(t)||!!c.querySelector('button[disabled],input[disabled]');
  }
  function findCard(q,exclude){
    const Q=norm(q);
    return cards().find(c=>c!==exclude&&(norm(code(c))===Q||norm(title(c)).includes(Q)||norm(c.innerText).includes(Q))&&!isUnavailable(c));
  }
  function wa(text){window.open('https://wa.me/'+PHONE+'?text='+encodeURIComponent(text),'_blank')}
  function highlight(c){
    if(!c)return;
    c.scrollIntoView({behavior:'smooth',block:'center'});
    c.classList.add('ev-alternativa-destacada');
    setTimeout(()=>c.classList.remove('ev-alternativa-destacada'),2600);
  }
  function addAdvice(card,html){
    let box=card.querySelector('.ev-consejo-comercial');
    if(!box){box=document.createElement('div');box.className='ev-consejo-comercial';card.appendChild(box)}
    box.innerHTML='<strong>💡 Recomendación de Llaves El Veci:</strong> '+html;
  }
  function commercialAdvice(card){
    const t=norm(title(card)+' '+code(card)+' '+card.innerText);
    if(/MAQUINA|COPIADORA|GOSO|GOZO|DEFU|FUBONG/.test(t)) return 'Para iniciar listo para trabajar, revise también el Kit Emprendedor, las llaves adicionales y las argollas. Así la máquina se entrega acompañada del material necesario para comenzar.';
    if(/CONTROL/.test(t)) return 'Conviene revisar también las pilas compatibles para entregar el control completo y listo para usar.';
    if(/CABEZA PLASTICA|COLORES/.test(t)) return 'Las argollas complementan estas llaves y facilitan entregar un producto terminado al cliente.';
    if(/TAG|RFID/.test(t)) return 'Para trabajar con RFID tags, revise también la clonadora compatible disponible en el catálogo.';
    if(/FRESA/.test(t)) return 'Revise el palpador correspondiente para trabajar con la misma medida.';
    if(/VERTICAL/.test(t)) return 'Una máquina vertical se aprovecha mejor junto con adaptadores, fresas y palpadores compatibles.';
    const c=norm(code(card));
    if(PAIRS[c]) return 'También puede revisar '+PAIRS[c]+', porque ambas referencias suelen consultarse juntas y cubren variantes relacionadas.';
    return '';
  }
  function patchStock(card){
    if(card.dataset.evStockFinal==='1')return;
    card.dataset.evStockFinal='1';
    if(!isUnavailable(card))return;
    card.classList.add('ev-sin-stock-final');
    const c=norm(code(card));
    const altInfo=ALT[c];
    const actions=document.createElement('div');actions.className='ev-stock-actions';
    if(altInfo){
      const alt=findCard(altInfo.query,card);
      if(alt){
        const b=document.createElement('button');b.type='button';b.className='ev-ver-alternativa';b.textContent='Ver alternativa disponible';
        b.onclick=()=>highlight(alt);actions.appendChild(b);
        const why=document.createElement('div');why.className='ev-razon-alternativa';why.textContent=altInfo.reason;actions.appendChild(why);
      }
    }
    const q=document.createElement('button');q.type='button';q.className='ev-consultar-stock';q.textContent='Consultar disponibilidad';
    q.onclick=()=>wa('Hola, necesito confirmar disponibilidad de '+title(card)+(code(card)?' (código '+code(card)+')':'')+'.');
    actions.appendChild(q);
    card.appendChild(actions);
  }
  function patchRelated(card){
    if(card.dataset.evRelatedFinal==='1')return;
    card.dataset.evRelatedFinal='1';
    if(isUnavailable(card))return;
    const advice=commercialAdvice(card);
    if(advice)addAdvice(card,advice);
  }
  function cleanWording(){
    const walker=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);
    const nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);
    nodes.forEach(n=>{
      if(/NFC\s+TAGS?/i.test(n.nodeValue||''))n.nodeValue=n.nodeValue.replace(/NFC\s+TAGS?/gi,'RFID tags');
    });
  }
  function patchAll(){cards().forEach(c=>{patchStock(c);patchRelated(c)});cleanWording()}
  function init(){
    patchAll();
    let timer;
    new MutationObserver(()=>{clearTimeout(timer);timer=setTimeout(patchAll,180)}).observe(document.body,{childList:true,subtree:true});
    document.addEventListener('click',e=>{
      const btn=e.target.closest&&e.target.closest('button');if(!btn)return;
      const card=btn.closest('.producto');if(!card||isUnavailable(card))return;
      const tx=norm(btn.textContent);
      if(/AGREGAR|ANADIR/.test(tx)){
        const advice=commercialAdvice(card);
        if(advice)setTimeout(()=>addAdvice(card,advice),250);
      }
    },true);
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>setTimeout(init,2400));
  else setTimeout(init,2400);
})();
</script>

<script id="ev-correccion-agotados-escritorio-script">
(function(){
  'use strict';
  const norm=v=>(v||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim();
  function unavailable(card){
    const t=norm(card.innerText||card.textContent);
    return /AGOTADO|NO DISPONIBLE|SIN STOCK/.test(t)||!!card.querySelector('button[disabled],input[disabled]');
  }
  function availableAlternative(card){
    const btn=card.querySelector('.ev-ver-alternativa');
    return !!btn;
  }
  function fixCard(card){
    if(!unavailable(card))return;
    card.classList.add('ev-agotado-bloqueado');
    card.querySelectorAll('.ev-consultar-stock').forEach(el=>el.remove());
    card.querySelectorAll('button').forEach(btn=>{
      const tx=norm(btn.textContent);
      const isAlt=btn.classList.contains('ev-ver-alternativa')||/VER ALTERNATIVA/.test(tx);
      if(!isAlt)btn.setAttribute('aria-hidden','true');
    });
    card.querySelectorAll('input,select').forEach(el=>{el.disabled=true;el.value='';});
    const actions=card.querySelector('.ev-stock-actions');
    if(actions&&!availableAlternative(card))actions.remove();
  }
  function classify(){
    document.querySelectorAll('.producto').forEach(card=>{
      const h=norm(card.querySelector('h2')?.textContent||'');
      if(/METODOS DE PAGO/.test(h))card.classList.add('ev-info-pago');
      if(/NUESTRA UBICACION/.test(h))card.classList.add('ev-info-ubicacion');
      fixCard(card);
    });
  }
  function init(){
    classify();
    let timer;
    new MutationObserver(()=>{clearTimeout(timer);timer=setTimeout(classify,120)}).observe(document.body,{childList:true,subtree:true,characterData:true});
    document.addEventListener('click',e=>{
      const card=e.target.closest&&e.target.closest('.producto.ev-agotado-bloqueado');
      if(!card)return;
      const btn=e.target.closest&&e.target.closest('button');
      if(btn&&(btn.classList.contains('ev-ver-alternativa')||/VER ALTERNATIVA/.test(norm(btn.textContent))))return;
      if(btn||e.target.matches?.('input,select')){e.preventDefault();e.stopImmediatePropagation();}
    },true);
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>setTimeout(init,2800));
  else setTimeout(init,2800);
})();
</script>

<script id="ev-correccion-final-visual-contenido-script">
(function(){
  'use strict';
  const norm=s=>(s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim();
  function reemplazarTextoVisible(root=document.body){
    const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode(n){
      const p=n.parentElement;
      if(!p||/SCRIPT|STYLE|NOSCRIPT|TEXTAREA/.test(p.tagName))return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }});
    const nodes=[]; while(walker.nextNode())nodes.push(walker.currentNode);
    nodes.forEach(n=>{
      let t=n.nodeValue;
      t=t.replace(/,?\s*llaves?\s+de\s+cañ[oó]n/gi,'');
      t=t.replace(/\bllaves?\s+de\s+cañ[oó]n\b/gi,'');
      t=t.replace(/\btags\b/gi,'RFID');
      t=t.replace(/\s{2,}/g,' ');
      if(t!==n.nodeValue)n.nodeValue=t;
    });
  }
  function prepararHero(){
    const headings=[...document.querySelectorAll('h1,h2,h3')];
    const h=headings.find(x=>/TODO PARA CERRAJERIA/.test(norm(x.textContent)));
    if(!h)return;
    let scope=h.parentElement;
    for(let i=0;i<3&&scope;i++,scope=scope.parentElement){
      const imgs=[...scope.querySelectorAll('img')].filter(img=>!img.closest('.producto'));
      if(imgs.length){
        const hero=imgs[0]; hero.classList.add('ev-hero-logo-mejorado'); return;
      }
    }
    const preceding=[...document.querySelectorAll('img')].filter(img=>img.compareDocumentPosition(h)&Node.DOCUMENT_POSITION_FOLLOWING);
    if(preceding.length)preceding[preceding.length-1].classList.add('ev-hero-logo-mejorado');
  }
  function prepararProductos(){
    document.querySelectorAll('.producto').forEach(card=>{
      const title=norm(card.querySelector('h2')?.textContent||'');
      if(/CABEZA PLASTICA DE COLORES|CABEZA PLASTICA.*COLOR/.test(title))card.classList.add('ev-color-llaves');
      const txt=norm(card.innerText||card.textContent);
      const agotado=/STOCK\s*:\s*AGOTADO|NO DISPONIBLE|SIN STOCK/.test(txt)||!!card.querySelector('button[disabled]');
      if(agotado){
        card.classList.add('ev-agotado-definitivo');
        card.querySelectorAll('button').forEach(btn=>{
          const bt=norm(btn.textContent);
          const alt=btn.classList.contains('ev-ver-alternativa')||/VER ALTERNATIVA/.test(bt);
          if(!alt)btn.remove();
        });
        card.querySelectorAll('input,select,label').forEach(el=>el.remove());
      }
    });
  }
  function aplicar(){reemplazarTextoVisible();prepararHero();prepararProductos();}
  let timer;
  function schedule(){clearTimeout(timer);timer=setTimeout(aplicar,100)}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>setTimeout(aplicar,3100));
  else setTimeout(aplicar,3100);
  new MutationObserver(schedule).observe(document.documentElement,{childList:true,subtree:true,characterData:true});
})();
</script>
